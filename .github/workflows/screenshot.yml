name: Take Screenshot & Save Title
on:
  push:                # or schedule, workflow_dispatch, etc.
    branches: [main]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers & system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run screenshot script
        run: node takeScreenshot.js

      - name: Commit & push files back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: screenshot and title from example.com [skip ci]"
          file_pattern: "screenshot.png title.txt"
